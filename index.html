<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WebGames</title>

<style>
body {
    margin: 0;
    background: white;
    font-family: Arial;
    text-align: center;
}

/* Top image */
#topImg {
    margin-top: 10px;
    max-width: 200px;
}

/* MENU GRID */
#menu {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    width: 80%;
    margin: 30px auto;
}

.card {
    background: #ccc;
    height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    cursor: pointer;
    border: 2px solid #666;
}

/* GAME */
#game {
    display: none;
    height: 100vh;
    background: white;
    position: relative;
    overflow: hidden;
}

#ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 4px;
    background: black;
}

#cube {
    position: absolute;
    bottom: 4px;
    left: 60px;
    width: 40px;
    height: 40px;
    background: black;
}

.obstacle {
    position: absolute;
    bottom: 4px;
    width: 25px;
    height: 40px;
    background: black;
}
</style>
</head>

<body>

<!-- TOP IMAGE -->
<img id="topImg" src="WebGames.png">

<!-- MENU -->
<div id="menu">
    <div class="card" onclick="startGame()">Cube Jump</div>
    <div class="card" onclick="startGame()">Cube Jump</div>
    <div class="card" onclick="startGame()">Cube Jump</div>
    <div class="card" onclick="startGame()">Cube Jump</div>
</div>

<!-- GAME -->
<div id="game">
    <div id="ground"></div>
    <div id="cube"></div>
</div>

<script>
let menu = document.getElementById("menu");
let game = document.getElementById("game");
let cube = document.getElementById("cube");

let jumping = false;
let velocity = 0;
let gravity = 0.8;
let y = 0;

let obstacles = [];
let running = false;

function startGame() {
    menu.style.display = "none";
    game.style.display = "block";
    running = true;
    spawn();
    update();
}

function jump() {
    if (!jumping) {
        velocity = 12;
        jumping = true;
    }
}

document.addEventListener("keydown", (e) => {
    if (e.code === "Space") jump();
});

document.addEventListener("touchstart", jump);

function spawn() {
    if (!running) return;

    let obs = document.createElement("div");
    obs.classList.add("obstacle");
    obs.style.left = "100%";
    game.appendChild(obs);
    obstacles.push(obs);

    setTimeout(spawn, 1500);
}

function update() {
    if (!running) return;

    // jump physics
    y += velocity;
    velocity -= gravity;

    if (y <= 0) {
        y = 0;
        jumping = false;
    }

    cube.style.bottom = (4 + y) + "px";

    // move obstacles
    for (let i = 0; i < obstacles.length; i++) {
        let o = obstacles[i];
        let left = parseFloat(o.style.left);
        left -= 6;
        o.style.left = left + "px";

        // collision
        if (left < 90 && left > 40 && y < 30) {
            reset();
        }

        if (left < -50) {
            o.remove();
            obstacles.splice(i, 1);
            i--;
        }
    }

    requestAnimationFrame(update);
}

function reset() {
    alert("Game Over");

    obstacles.forEach(o => o.remove());
    obstacles = [];

    running = false;
    menu.style.display = "grid";
    game.style.display = "none";
    y = 0;
}
</script>

</body>
</html>
